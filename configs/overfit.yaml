# small tier: A100-80GB, baseline data (500K frames), trial/ablation tier between tiny and launch.
# VAE d=256 (~7.3M), DiT d=256 depth=12 ctx=8 (~16M). Targets val L1 < 0.015 + horizon-2x > 100.

seed: 0

vae:
  hidden_dim: 256          # 12 d^2 * (enc+dec) -> 12 * 256^2 * 9 ~ 7.1M params
  enc_layers: 3
  dec_layers: 6            # asymmetric: deeper decoder per literature
  heads: 8                 # 256 / 8 = 32 head_dim
  patch_size: 8
  latent_channels: 16
  kl_beta: 1.0e-6
  mlp_ratio: 4
  lpips_weight: 0.5        # 2026-06-01: LPIPS on to sharpen the 4px ball (M1 ball detection was only 36%)

dit:
  hidden_dim: 256
  depth: 12
  heads: 8                 # head_dim = 32
  head_dim: 32
  patch_size: 4            # 256x192 latent 24x32 / 4 = 48 spatial tok/frame = the 8x6 Snake grid (1 cell = 1 token)
  context_frames: 8        # double tiny -- longer temporal memory
  num_actions: 4          # UP/DOWN/LEFT/RIGHT, absolute (Snake, D028)
  action_mode: concat     # dual path (D029): action token (M4) + AdaLN-add together
  mlp_ratio: 4

diffusion:
  sigma_data: 2.6          # measured 2026-06-11 on Snake small-VAE latents (2400 frames, std of mu = 2.597)
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  p_mean: 1.25           # ln(1.34 x sigma_data 2.6) -- median train sigma MUST scale with sigma_data (B002)
  p_std: 1.2             # DIAMOND's width
  forcing: true
  motion_weight: 5         # mild (D029): changed cells are whole tokens now; 15 was compensating for a sub-token ball
  context_noise_min: 0.002 # D024/D029: train context frames at UNIFORM noise up to ~0.5 x sigma_data
  context_noise_max: 1.3   # = 0.5 x measured sigma_data 2.6 (GameNGen corrupts up to ~70%; old 0.2 was ~10x too weak)
  static_weight: 1.0       # multiplicative (2026-06-12 fix): 2x weight on static cells incl. body interior
  static_thresh: 0.1       # only used if static_weight > 0
  action_dropout: 0.1      # D029: null-action windows -> CFG-on-action available at inference
  ar_steps: 1              # DIAMOND training-time AR feedback: one window predicted from own output (2026-06-12)
  num_sample_steps: 4      # Euler 3-4 steps is the DIAMOND-proven regime (D029); sampling sigma_max = 10 x sigma_data

training:
  device: auto
  batch_size: 4            # 256x192 is 4x the pixels -> B=4 (68 frames/step) fits A100-80GB; B=16 OOMs in LPIPS (D021)
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_steps: 100
  total_steps: 3000      # overfit proof: ~50 epochs over the 2k fixed frames
  grad_clip: 1.0
  ema_decay: 0.9999
  log_every: 100
  val_every: 2500
  ckpt_every: 1500

data:
  index_path: data/overfit/index.parquet
  cache_size: 4
  event_frac: 0.4          # D029: 40% of DiT windows end on an eat/death so the model commits to events
vae_ckpt: checkpoints/vae_small.pt   # overfit tier reuses the Gate-1 VAE
