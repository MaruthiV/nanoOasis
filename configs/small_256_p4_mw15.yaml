# R5 sweep arm: motion_weight 15 (mid). See small_256_p4_mw5.yaml header. Else identical to small_256_p4.

seed: 0

vae:
  hidden_dim: 256
  enc_layers: 3
  dec_layers: 6
  heads: 8
  patch_size: 8
  latent_channels: 16
  kl_beta: 1.0e-6
  mlp_ratio: 4
  lpips_weight: 0.5

dit:
  hidden_dim: 256
  depth: 12
  heads: 8
  head_dim: 32
  patch_size: 4
  context_frames: 8
  num_actions: 3
  mlp_ratio: 4

diffusion:
  sigma_data: 2.44
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  p_mean: -0.4
  p_std: 1.0
  forcing: true
  motion_weight: 15.0
  num_sample_steps: 16

training:
  device: auto
  batch_size: 4
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_steps: 1000
  total_steps: 60000
  grad_clip: 1.0
  ema_decay: 0.9999
  log_every: 100
  val_every: 2500
  ckpt_every: 5000

data:
  index_path: data/baseline/index.parquet
  cache_size: 64

vae_ckpt: checkpoints/vae_small.pt
