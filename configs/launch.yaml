# launch tier: 4xH100 (or 4xH200/B200 if available), full dataset, the real launch run.
# VAE d=256, 4+8 layers (~9.4M). DiT d=512, depth=16, ctx=8, patch4, shared AdaLN (~75M).
# 256x192 + motion_weight (D021 scale-up + R5 motion-aware loss; validated at the small tier R3-R5).

seed: 0

vae:
  hidden_dim: 256          # d
  enc_layers: 4
  dec_layers: 8            # deeper decoder; 12 * 256^2 * 12 ~ 9.4M params
  heads: 8                 # 256 / 8 = 32 head_dim
  patch_size: 8
  latent_channels: 16
  kl_beta: 1.0e-6
  mlp_ratio: 4
  lpips_weight: 0.5        # perceptual loss weight; 0 disables. Tuned per SD3-class VAE conventions.

dit:
  hidden_dim: 512
  depth: 24                # ~104M DiT (D008 stretch). Gate 3 ONLY -- the small tier is the first ship candidate (D029)
  heads: 8                 # head_dim = 64
  head_dim: 64
  patch_size: 4            # 256x192 latent 24x32 / 4 = 48 spatial tok/frame = the 8x6 Snake grid (1 cell = 1 token)
  context_frames: 8        # M3: ctx8 matches ctx16 at ~2.7x less compute
  num_actions: 4          # UP/DOWN/LEFT/RIGHT, absolute (Snake, D028)
  action_mode: concat     # dual path (D029): action token (M4) + AdaLN-add together
  mlp_ratio: 4

diffusion:
  sigma_data: 3.15         # GREY-BREAKOUT value -- RE-MEASURE on the Snake launch-VAE latents before any Gate-3 run
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  p_mean: 1.44           # ln(1.34 x sigma_data 3.15) -- rescale when sigma_data is re-measured (B002)
  p_std: 1.2             # DIAMOND's width
  forcing: true
  motion_weight: 5         # mild (D029): changed cells are whole tokens now
  context_noise_min: 0.002 # D024/D029: context trained at UNIFORM noise up to ~0.5 x sigma_data
  context_noise_max: 1.6   # (GameNGen corrupts up to ~70% of data std) -- re-set after sigma_data is measured
  static_weight: 0.0       # off (D029): the static-vs-events tradeoff was the Breakout killer; reserve lever only
  static_thresh: 0.1       # only used if static_weight > 0
  action_dropout: 0.1      # D029: CFG-on-action option
  num_sample_steps: 4      # Euler 3-4 steps (D029); sampling sigma_max = 10 x sigma_data, not the training 80

training:
  device: auto
  batch_size: 16           # smaller -> fewer cache misses per step on the full-tier 200-episode index
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_steps: 2000
  total_steps: 180000      # ~1.8x M7: with more/bigger data the model sees ~2.9M frames (vs M7's 1.6M) -> more runs
  grad_clip: 1.0
  ema_decay: 0.9999
  log_every: 100
  val_every: 2500
  ckpt_every: 5000

data:
  # DiT trains on pre-encoded latents. NOTE: /full + /full_latents on the volume are still GREY BREAKOUT --
  # regenerate with the Snake game before any Gate-3 run.
  index_path: data/full_latents/index.parquet
  pre_encoded: true
  cache_size: 220          # holds all train latent episodes (needs ~256 GB host RAM, set on train_dit_launch)
  event_frac: 0.4          # D029: 40% of DiT windows end on an eat/death so the model commits to events
