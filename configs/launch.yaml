# launch tier: 4xH100 (or 4xH200/B200 if available), full dataset, the real launch run.
# VAE d=256, 4+8 layers (~9.4M). DiT d=512, depth=16, ctx=8, patch4, shared AdaLN (~75M).
# 256x192 + motion_weight (D021 scale-up + R5 motion-aware loss; validated at the small tier R3-R5).

seed: 0

vae:
  hidden_dim: 256          # d
  enc_layers: 4
  dec_layers: 8            # deeper decoder; 12 * 256^2 * 12 ~ 9.4M params
  heads: 8                 # 256 / 8 = 32 head_dim
  patch_size: 8
  latent_channels: 16
  kl_beta: 1.0e-6
  mlp_ratio: 4
  lpips_weight: 0.5        # perceptual loss weight; 0 disables. Tuned per SD3-class VAE conventions.

dit:
  hidden_dim: 512
  depth: 24                # bumped 16→24 (~104M DiT): capacity to pre-empt the brick flicker (R5); D008 stretch
  heads: 8                 # head_dim = 64
  head_dim: 64
  patch_size: 4            # 256x192 latent 24x32 / 4 = 48 spatial tok/frame (R4/R5 validated; patch 2 = 192 = M6-shaky)
  context_frames: 8        # M3: ctx8 matches ctx16 at ~2.7x less compute
  num_actions: 3          # NONE/LEFT/RIGHT (Breakout, D018)
  mlp_ratio: 4

diffusion:
  # measured 2026-06-04 on the actual launch latents (data/full_latents, vae_launch.pt): std = 2.88.
  # (the prior 2.44 was the small VAE's latents -- training EDM at the wrong scale is the H003 hazard.)
  sigma_data: 2.88
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  p_mean: -0.4
  p_std: 1.0
  forcing: true
  motion_weight: 15.0      # R5: up-weight the moving region (the ball) so the DiT can't static-collapse
  num_sample_steps: 16

training:
  device: auto
  batch_size: 16           # smaller -> fewer cache misses per step on the full-tier 200-episode index
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_steps: 2000
  total_steps: 100000
  grad_clip: 1.0
  ema_decay: 0.9999
  log_every: 100
  val_every: 2500
  ckpt_every: 5000

data:
  # DiT (M7) trains on the pre-encoded full latents (M7·3): 5M frames -> data/full_latents (~120 GB fp16).
  index_path: data/full_latents/index.parquet
  pre_encoded: true        # shards hold VAE latents -> train.py skips the per-step encode
  cache_size: 220          # cache all 195 train latent episodes (~120 GB) -> zero loader misses (needs ~200 GB RAM)
