# tiny tier on PRE-ENCODED latents (data.pre_encoded) -- validates the launch-run latent pipeline.
# Same as tiny.yaml but reads latent shards (no per-step VAE encode). The vae section is unused here.

seed: 0

vae:
  hidden_dim: 128
  enc_layers: 2
  dec_layers: 3
  heads: 4
  patch_size: 8
  latent_channels: 16
  kl_beta: 1.0e-6
  mlp_ratio: 4

dit:
  hidden_dim: 128
  depth: 4
  heads: 4
  head_dim: 32
  patch_size: 2
  context_frames: 4
  num_actions: 3
  mlp_ratio: 4

diffusion:
  sigma_data: 0.5
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  p_mean: -0.4
  p_std: 1.0
  forcing: true
  num_sample_steps: 16

training:
  device: auto
  batch_size: 4
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_steps: 200
  total_steps: 5000
  grad_clip: 1.0
  ema_decay: 0.9999
  log_every: 50
  val_every: 1000
  ckpt_every: 1000

data:
  index_path: data/smoke_latents/index.parquet
  pre_encoded: true
  cache_size: 32
