# tiny tier: pipeline-validation only. Targets ~2.7M params total, MacBook MPS, ~30 min.
# See docs/IMPLEMENTATION_PLAN.md "Model ladder" and docs/DECISIONS.md D008.

seed: 0

vae:
  hidden_dim: 128          # 12 d^2 * (enc+dec) ~ 12 * 128^2 * 5 ~ 1.0M params
  enc_layers: 2
  dec_layers: 3
  heads: 4                 # 128 / 4 = 32 head_dim
  patch_size: 8            # 128/8 x 96/8 = 16 x 12 spatial grid -> 192 tokens
  latent_channels: 16      # latent grid (B, 16, 12, 16)
  kl_beta: 1.0e-6          # research_notes.md §0 -- keep KL near zero
  mlp_ratio: 4

dit:
  hidden_dim: 128
  depth: 4
  heads: 4                 # head_dim = 32
  head_dim: 32
  patch_size: 4            # latent 24x32 / 4 = 8x6 = 48 tokens = the Snake grid (1 cell = 1 token, D028)
  context_frames: 4        # past frames the model conditions on (tiny tier)
  num_actions: 4          # UP/DOWN/LEFT/RIGHT, absolute (Snake, D028)
  action_mode: concat     # dual path (D029): action token + AdaLN-add together
  mlp_ratio: 4

diffusion:
  # EDM preconditioning -- DECISIONS.md D001
  sigma_data: 0.5          # placeholder; measure the real value on trained VAE latents
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  # log-normal sigma sampling -- research_notes.md "loss formulation"
  p_mean: -0.4
  p_std: 1.0
  # diffusion forcing per-frame sigma -- DECISIONS.md D002
  forcing: true
  motion_weight: 5         # mild changed-cell up-weight (D029)
  context_noise_min: 0.002 # D024/D029: context trained at uniform noise up to ~0.5 x sigma_data
  context_noise_max: 0.25
  action_dropout: 0.1      # D029: CFG-on-action option
  num_sample_steps: 4      # Euler few-step (D029)

training:
  device: auto             # cuda > mps > cpu auto-detect at runtime
  batch_size: 4
  lr: 1.0e-4
  betas: [0.9, 0.95]       # DECISIONS.md D012
  weight_decay: 0.0
  warmup_steps: 200
  total_steps: 5000        # ~30 min on MPS
  grad_clip: 1.0
  ema_decay: 0.9999
  log_every: 50
  val_every: 1000
  ckpt_every: 1000

data:
  index_path: data/smoke/index.parquet
  cache_size: 32
  event_frac: 0.4          # D029: 40% of DiT windows end on an eat/death
