# M6 ablation: DiT patch_size 1 (vs small.yaml's 2). Diffusion Forcing + ctx8 (M2/M3 winners).
# patch=1 -> 12x16=192 latent tokens/frame (vs patch=2's 48); the cheap resolution lever for the ball.
# Shares the small VAE via vae_ckpt; only diff vs `small` is dit.patch_size.

seed: 0

vae:
  hidden_dim: 256
  enc_layers: 3
  dec_layers: 6
  heads: 8
  patch_size: 8
  latent_channels: 16
  kl_beta: 1.0e-6
  mlp_ratio: 4
  lpips_weight: 0.5

vae_ckpt: checkpoints/vae_small.pt

dit:
  hidden_dim: 256
  depth: 12
  heads: 8
  head_dim: 32
  patch_size: 1            # M6: finer DiT resolution (192 tok/frame vs patch=2's 48)
  context_frames: 8
  num_actions: 3
  mlp_ratio: 4

diffusion:
  sigma_data: 2.23
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  p_mean: -0.4
  p_std: 1.0
  forcing: true
  num_sample_steps: 16

training:
  device: auto
  batch_size: 16
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_steps: 1000
  total_steps: 100000
  grad_clip: 1.0
  ema_decay: 0.9999
  log_every: 100
  val_every: 2500
  ckpt_every: 5000

data:
  index_path: data/baseline/index.parquet
  cache_size: 64
