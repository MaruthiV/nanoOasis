# M3 ablation: context length 16 (vs small.yaml's 8 and small_ctx4's 4). Diffusion Forcing (M2 winner).
# Shares the small VAE via vae_ckpt; only diff vs `small` is dit.context_frames.

seed: 0

vae:
  hidden_dim: 256
  enc_layers: 3
  dec_layers: 6
  heads: 8
  patch_size: 8
  latent_channels: 16
  kl_beta: 1.0e-6
  mlp_ratio: 4
  lpips_weight: 0.5

vae_ckpt: checkpoints/vae_small.pt

dit:
  hidden_dim: 256
  depth: 12
  heads: 8
  head_dim: 32
  patch_size: 2
  context_frames: 16       # M3: long context (= launch tier's context)
  num_actions: 3
  mlp_ratio: 4

diffusion:
  sigma_data: 2.23
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  p_mean: -0.4
  p_std: 1.0
  forcing: true
  num_sample_steps: 16

training:
  device: auto
  batch_size: 16
  lr: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  warmup_steps: 1000
  total_steps: 100000
  grad_clip: 1.0
  ema_decay: 0.9999
  log_every: 100
  val_every: 2500
  ckpt_every: 5000

data:
  index_path: data/baseline/index.parquet
  cache_size: 64
